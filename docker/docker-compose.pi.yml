# Raspberry Pi 5 / off-grid portable overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.pi.yml up
#
# Designed for: Pi 5 (4GB), battery pack, WiFi hotspot.
# All images in the base stack publish arm64 builds.

services:

  postgres:
    deploy:
      resources:
        limits:
          memory: 512m

  rabbitmq:
    deploy:
      resources:
        limits:
          memory: 256m

  opentakserver:
    deploy:
      resources:
        limits:
          memory: 512m

  eud-handler:
    deploy:
      resources:
        limits:
          memory: 256m

  cot-parser:
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    deploy:
      resources:
        limits:
          memory: 64m

  mbtileserver:
    deploy:
      resources:
        limits:
          memory: 64m

  # Meshtastic LoRa gateway (off-grid bridge) — Phase 3.
  # Gated behind the "mesh" profile until integrations/meshtastic/gateway.py
  # exists; enable with --profile mesh once it does.
  meshtastic-gateway:
    image: python:3.11-slim
    container_name: skitak-meshtastic
    restart: unless-stopped
    profiles: ["mesh"]
    privileged: true          # USB serial access for LoRa radio
    volumes:
      - /dev:/dev
      - ../integrations/meshtastic:/app
    working_dir: /app
    command: ["python", "gateway.py"]
    environment:
      MESHTASTIC_SERIAL_PORT: ${MESHTASTIC_PORT:-/dev/ttyUSB0}
      TAK_SERVER_HOST: opentakserver
    depends_on:
      - opentakserver
