# Murmur (Mumble server) configuration for SkiTAK
# Authentication is delegated to OpenTAKServer via the authenticator script

database=/data/mumble/murmur.sqlite

# Bind on all interfaces inside the Docker network
host=0.0.0.0
port=64738

# Internal authenticator port (OTS connects here to validate users)
icesecretread=
icesecretwrite=
ice="tcp -h 127.0.0.1 -p 6502"

# Server identity
registerName=SkiTAK Voice
welcometext=SkiTAK voice comms — push to talk.

# Limits
users=100
usersperchannel=0
textmessagelength=2000
imagemessagelength=0

# Audio quality
bandwidth=72000
defaultchannel=0

# Logging
logfile=/data/mumble/murmur.log
logdays=7

# Disable self-registration — accounts come from OTS
allowhtml=false

# Superuser password — set via MUMBLE_SUPERUSER_PASSWORD env var at first boot
# Run: murmurd -ini /etc/mumble/murmur.ini -supw <password>
