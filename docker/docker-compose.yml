# SkiTAK stack — OpenTAKServer + SkiTAK plugin, PostGIS, RabbitMQ, Nginx.
# Run from the repo root with:  make up   (or docker compose --env-file docker/.env -f docker/docker-compose.yml up -d)
#
# OTS runs as three processes sharing one image and one data volume,
# mirroring upstream's systemd layout:
#   opentakserver — Flask API + Socket.IO + plugin host (internal :8081)
#   eud-handler   — CoT TLS streaming listener (public :8089)
#   cot-parser    — CoT parsing/routing worker (RabbitMQ consumer)

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: skitak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skitak}
      POSTGRES_USER: ${POSTGRES_USER:-skitak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skitak} -d ${POSTGRES_DB:-skitak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  # OTS builds its Socket.IO queue URL without credentials (amqp://<host>), so
  # it can only authenticate as guest/guest. The custom conf lifts RabbitMQ's
  # guest loopback restriction; the broker is never published outside the
  # Docker network.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: skitak-rabbitmq
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/20-skitak.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── OpenTAKServer (Flask API + plugins) ──────────────────────────────────
  opentakserver:
    build:
      context: ..
      dockerfile: docker/opentakserver/Dockerfile
    image: skitak-ots:local
    container_name: skitak-ots
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment: &ots-env
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-skitak}
      POSTGRES_USER: ${POSTGRES_USER:-skitak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      SECURITY_PASSWORD_SALT: ${SECURITY_PASSWORD_SALT:?SECURITY_PASSWORD_SALT must be set}
      SKITAK_SERVER_ADDRESS: ${SERVER_HOSTNAME:?SERVER_HOSTNAME must be set}
      SKITAK_ADMIN_PASSWORD: ${SKITAK_ADMIN_PASSWORD:-}
    volumes:
      - ots_data:/data/opentakserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── CoT TLS streaming listener (TAK clients connect here) ────────────────
  eud-handler:
    image: skitak-ots:local
    container_name: skitak-eud-handler
    restart: unless-stopped
    command: ["eud_handler", "--ssl"]
    depends_on:
      opentakserver:
        condition: service_healthy   # config.yml, DB schema, and CA must exist
    environment: *ots-env
    ports:
      - "8089:8089"
    volumes:
      - ots_data:/data/opentakserver
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 8089), 3)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── CoT parser / router worker ────────────────────────────────────────────
  cot-parser:
    image: skitak-ots:local
    container_name: skitak-cot-parser
    restart: unless-stopped
    command: ["cot_parser"]
    depends_on:
      opentakserver:
        condition: service_healthy
    environment: *ots-env
    volumes:
      - ots_data:/data/opentakserver

  # ── Nginx (reverse proxy + TLS) ───────────────────────────────────────────
  # Serves the built dashboard and terminates HTTPS using the certificate the
  # OTS CA issues on first boot (self-signed chain).
  nginx:
    image: nginx:1.27-alpine
    container_name: skitak-nginx
    restart: unless-stopped
    depends_on:
      opentakserver:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/skitak.conf:/etc/nginx/conf.d/skitak.conf:ro
      - ./nginx/options-ssl.conf:/etc/nginx/options-ssl.conf:ro
      - ots_data:/etc/skitak/ots:ro                # OTS CA + server cert
      - ../dashboard/dist:/var/www/dashboard:ro    # built React app (make build-dashboard)

  # ── mbtileserver (offline map tiles) ─────────────────────────────────────
  mbtileserver:
    image: consbio/mbtileserver:latest
    container_name: skitak-tiles
    restart: unless-stopped
    volumes:
      - tile_data:/tilesets
    command: ["--dir=/tilesets", "--port=8500"]

  # ── Mumble / Murmur (voice PTT) — optional, enable with --profile voice ──
  # OTS 1.7.x can only reach the Mumble Ice authenticator on 127.0.0.1, so
  # OTS-integrated auth is not possible across containers yet; this runs as a
  # standalone voice server until that lands upstream.
  mumble:
    image: mumblevoip/mumble-server:latest
    container_name: skitak-mumble
    restart: unless-stopped
    profiles: ["voice"]
    ports:
      - "64738:64738"        # TCP + UDP voice
      - "64738:64738/udp"
    volumes:
      - ./mumble/murmur.ini:/etc/mumble/murmur.ini:ro
      - mumble_data:/data/mumble
    environment:
      MURMUR_CONFIG: /etc/mumble/murmur.ini
      MUMBLE_SUPERUSER_PASSWORD: ${MUMBLE_SUPERUSER_PASSWORD:-}

  # ── MediaMTX (video relay) — optional, enable with --profile video ───────
  # Phase 3 feature. Do NOT enable on a public host until stream
  # authentication is configured in mediamtx.yml.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: skitak-mediamtx
    restart: unless-stopped
    profiles: ["video"]
    ports:
      - "8554:8554"          # RTSP
      - "1935:1935"          # RTMP
      - "8889:8889"          # WebRTC HTTP
      - "8889:8889/udp"      # WebRTC UDP
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_PROTOCOLS: tcp

volumes:
  postgres_data:
  rabbitmq_data:
  ots_data:
  mumble_data:
  tile_data:
