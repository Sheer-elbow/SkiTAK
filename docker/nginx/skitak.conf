# HTTP — redirect everything to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — web dashboard + API
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.pem;
    ssl_certificate_key /etc/nginx/certs/server.key;
    include             /etc/nginx/options-ssl.conf;

    # ── Web dashboard (React SPA) ─────────────────────────────────────────
    root /var/www/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── OTS REST API (Marti-compatible) ───────────────────────────────────
    location /api/ {
        proxy_pass         http://opentakserver:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Marti API (TAK client data sync) ─────────────────────────────────
    location /Marti/ {
        proxy_pass         http://opentakserver:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Map tiles ─────────────────────────────────────────────────────────
    location /tiles/ {
        proxy_pass         http://mbtileserver:8500/;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── MediaMTX WebRTC (video feeds) ────────────────────────────────────
    location /webrtc/ {
        proxy_pass         http://mediamtx:8889/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── WebSocket (live map updates) ─────────────────────────────────────
    location /ws/ {
        proxy_pass         http://opentakserver:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Enrollment data package download ─────────────────────────────────
    # Clients hit this URL to download their cert + config package
    location /enroll/ {
        proxy_pass         http://opentakserver:8080/api/enroll/;
        proxy_set_header   Host $host;
    }
}
