# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  postgres:
    ports:
      - "5432:5432"          # expose for local DB tools

  rabbitmq:
    ports:
      - "5672:5672"          # AMQP
      - "15672:15672"        # management UI at http://localhost:15672

  opentakserver:
    ports:
      - "8080:8080"          # Flask API direct (bypass Nginx)
      - "8088:8088"          # unencrypted CoT (dev only)
    environment:
      OTS_DEBUG: "true"
      OTS_LOG_LEVEL: DEBUG
    volumes:
      - ../../server:/app/server  # hot reload server code

  nginx:
    volumes:
      - ../../dashboard/src:/var/www/dashboard/src  # serve unbuilt for dev proxy

  mediamtx:
    ports:
      - "9997:9997"          # MediaMTX API (dev)
