# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# (or: make dev)

services:

  postgres:
    ports:
      - "5432:5432"          # expose for local DB tools

  rabbitmq:
    ports:
      - "15672:15672"        # management UI at http://localhost:15672 (guest/guest)

  opentakserver:
    ports:
      - "8081:8081"          # Flask API direct (bypass Nginx)
    environment:
      OTS_DEBUG: "true"
    # The skitak plugin is pip-installed into the image; after changing
    # server/skitak/* rebuild with:  make build && make dev
