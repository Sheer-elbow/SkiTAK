# XcodeGen project definition — generates SkiTAK.xcodeproj.
#
# On the Mac mini:
#   brew install xcodegen
#   cd ios && xcodegen generate
#   open SkiTAK.xcodeproj
#
# Then set your Team under Signing & Capabilities and run on a device
# (background location does not behave realistically in the simulator).
name: SkiTAK
options:
  bundleIdPrefix: io.skitak
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  SkiTAK:
    type: application
    platform: iOS
    sources:
      - path: SkiTAK
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.skitak.app
        INFOPLIST_FILE: SkiTAK/Info.plist
        CODE_SIGN_ENTITLEMENTS: SkiTAK/SkiTAK.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
